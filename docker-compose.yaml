services:
  free-deepseek-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: free-deepseek-api:latest
    container_name: free-deepseek-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${PORT:-9655}"
    volumes:
      - ./deepseek-auth.json:/app/accounts/deepseek-auth.json:ro
    mem_limit: 200m
    memswap_limit: 50m
    cpus: "0.50"